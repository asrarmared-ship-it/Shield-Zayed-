version: 2

# ═══════════════════════════════════════════════════════════════════════════
# 🔐 GLOBAL REGISTRIES - SECURE SOURCE VERIFICATION
# ═══════════════════════════════════════════════════════════════════════════

registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{secrets.GITHUB_TOKEN}}
  
  pypi-github:
    type: python-index
    url: https://pypi.org/simple
    replaces-base: true

# ═══════════════════════════════════════════════════════════════════════════
# 🐍 PYTHON ECOSYSTEM - CORE SECURITY ENGINE
# ═══════════════════════════════════════════════════════════════════════════

updates:
  # ─────────────────────────────────────────────────────────────────────────
  # Python Dependencies - Primary Security Stack
  # ─────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "00:00"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 20
    reviewers:
      - "asrar-mared"
    assignees:
      - "asrar-mared"
    labels:
      - "dependencies"
      - "security"
      - "python"
      - "critical-update"
      - "auto-merge-candidate"
    commit-message:
      prefix: "🔒 [SECURITY]"
      prefix-development: "⬆️ [DEV]"
      include: "scope"
    versioning-strategy: increase
    allow:
      - dependency-type: "all"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    
  # ─────────────────────────────────────────────────────────────────────────
  # Python Security-Specific Dependencies
  # ─────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/src/security"
    schedule:
      interval: "daily"
      time: "01:00"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 15
    reviewers:
      - "asrar-mared"
    assignees:
      - "asrar-mared"
    labels:
      - "security-core"
      - "critical"
      - "python"
      - "immediate-review"
    commit-message:
      prefix: "🚨 [CRITICAL-SEC]"
      include: "scope"

  # ─────────────────────────────────────────────────────────────────────────
  # Python ML/AI Security Models
  # ─────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/src/analysis"
    schedule:
      interval: "daily"
      time: "02:00"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 10
    reviewers:
      - "asrar-mared"
    assignees:
      - "asrar-mared"
    labels:
      - "ml-security"
      - "ai-models"
      - "python"
      - "analysis-engine"
    commit-message:
      prefix: "🧠 [ML-SEC]"

