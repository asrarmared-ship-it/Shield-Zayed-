name: "Zayed Shield — Azure Web Apps (Node.js)"

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NODE_VERSION:    "24"
  AZURE_WEBAPP_PACKAGE_PATH: "."

jobs:

# ─── JOB 1: BUILD ─────────────────────────────────────────────────────────────
  build:
    name: "Build — Node.js $env.NODE_VERSION
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # cache removed — lock file bootstrapped manually below

      - name: Bootstrap package.json if absent
        run: |
          if [[ ! -f package.json ]]; then
            echo "No package.json found — bootstrapping minimal project"
            npm init -y
          fi

      - name: Bootstrap lock file if absent
        run: |
          if [[ ! -f package-lock.json ]] && \
             [[ ! -f yarn.lock ]]         && \
             [[ ! -f npm-shrinkwrap.json ]]; then
            echo "No lock file detected — generating package-lock.json"
            npm install --package-lock-only --ignore-scripts 2>/dev/null || \
            npm install --ignore-scripts 2>/dev/null || true
          else
            echo "Lock file found — skipping bootstrap"
          fi

      - name: Install dependencies
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci --prefer-offline
          else
            npm install --ignore-scripts
          fi

      - name: Build application
        run: |
          if npm run | grep -q "^  build$" 2>/dev/null; then
            npm run build --if-present
          else
            echo "No build script defined — skipping build step"
          fi

      - name: Run tests
        run: |
          if npm run | grep -q "^  test$" 2>/dev/null; then
            npm test --if-present
          else
            echo "No test script defined — skipping test step"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !.git
            !node_modules
            !.github
          retention-days: 1

# ─── JOB 2: DEPLOY ────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy — Azure Web Apps"
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install production dependencies
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci --omit=dev --prefer-offline
          else
            npm install --omit=dev --ignore-scripts
          fi

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name:        ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package:         $ env.AZURE_WEBAPP_PACKAGE_PATH 
