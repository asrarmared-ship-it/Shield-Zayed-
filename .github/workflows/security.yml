# ═══════════════════════════════════════════════════════════════════════════
# ZAYED CYBERSHIELD - COMPREHENSIVE SECURITY WORKFLOW
# ═══════════════════════════════════════════════════════════════════════════
# File: .github/workflows/security.yml
# Project: Zayed CyberShield Protection System
# Author: assar-mared
# Version: 2.0.0
# Date: 2026-01-05
#
# Description:
#   Professional multi-layer security scanning workflow for GitHub Actions
#   Implements defense-in-depth security testing with 15+ security tools
#
# Features:
#   ✅ SAST (Static Application Security Testing)
#   ✅ Dependency Vulnerability Scanning
#   ✅ Secret Detection
#   ✅ Container Security Scanning
#   ✅ License Compliance
#   ✅ SBOM Generation
#   ✅ Code Quality Analysis
#   ✅ Infrastructure as Code Security
#   ✅ Supply Chain Security
#   ✅ Automated Security Reporting
#
# License: MIT - All rights reserved © 2026
# ═══════════════════════════════════════════════════════════════════════════

name: Security & Vulnerability Scanning

on:
  push:
    branches:
      - main
      - develop
      - 'protect/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened

  schedule:
    # Daily security scan at midnight UTC
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      scan_level:
        description: 'Security scan level'
        required: true
        default: 'standard'
        type: choice
        options:
          - quick
          - standard
          - full
          - extreme

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

env:
  SCAN_LEVEL: ${{ github.event.inputs.scan_level || 'standard' }}
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20.x'
  GO_VERSION: '1.21'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: METADATA & SETUP
  # ═══════════════════════════════════════════════════════════════════════════

  metadata:
    name: Metadata & Setup
    runs-on: ubuntu-latest
    outputs:
      scan_id: ${{ steps.metadata.outputs.scan_id }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Generate Scan ID
        id: metadata
        run: |
          SCAN_ID="security-$(date +%Y%m%d-%H%M%S)-${{ github.run_number }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "scan_id=$SCAN_ID" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "### Security Scan Started" >> $GITHUB_STEP_SUMMARY
          echo "**Scan ID:** \`$SCAN_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $TIMESTAMP" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: SECRET SCANNING
  # ═══════════════════════════════════════════════════════════════════════════

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: GitLeaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Detect-Secrets Scan
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --force-use-all-plugins \
            --exclude-files '.git/|node_modules/|\.lock$' \
            > secrets-baseline.json || true
          
          if [ -s secrets-baseline.json ]; then
            echo "⚠️ Potential secrets detected!" >> $GITHUB_STEP_SUMMARY
            cat secrets-baseline.json >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No secrets detected" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Upload Secrets Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-report-${{ needs.metadata.outputs.scan_id }}
          path: secrets-baseline.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: DEPENDENCY VULNERABILITY SCANNING
  # ═══════════════════════════════════════════════════════════════════════════

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: NPM Audit
        if: hashFiles('package.json') != ''
        run: |
          npm audit --json > npm-audit-report.json || true
          npm audit >> $GITHUB_STEP_SUMMARY || true
        continue-on-error: true

      - name: Snyk Security Scan
        if: hashFiles('package.json') != ''
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif
        continue-on-error: true

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
        continue-on-error: true

      - name: Grype Vulnerability Scan
        uses: anchore/scan-action@v3
        with:
          path: "."
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          output-file: grype-results.sarif
        continue-on-error: true

      - name: Upload SARIF Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: dependency-scanning
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4: SAST (STATIC APPLICATION SECURITY TESTING)
  # ═══════════════════════════════════════════════════════════════════════════

  sast-scan:
    name: SAST Analysis
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript,python,cpp'
          queries: security-and-quality
        continue-on-error: true

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:multi"
        continue-on-error: true

      - name: Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
          generateSarif: true
        continue-on-error: true

      - name: Bandit Python Security
        if: hashFiles('**/*.py') != ''
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . >> $GITHUB_STEP_SUMMARY || true
        continue-on-error: true

      - name: ESLint Security Plugin
        if: hashFiles('**/*.js') != ''
        run: |
          npm install -g eslint eslint-plugin-security
          eslint . --ext .js --format json --output-file eslint-report.json || true
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 5: CONTAINER SECURITY
  # ═══════════════════════════════════════════════════════════════════════════

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: metadata
    if: hashFiles('**/Dockerfile') != ''

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          docker build -t security-scan:${{ github.sha }} . || true
        continue-on-error: true

      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'security-scan:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-container.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Grype Container Scan
        uses: anchore/scan-action@v3
        with:
          image: 'security-scan:${{ github.sha }}'
          fail-build: false
          severity-cutoff: critical
        continue-on-error: true

      - name: Dockle Container Linter
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:latest \
            security-scan:${{ github.sha }} || true
        continue-on-error: true

      - name: Upload Container Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-container.sarif
          category: container-security
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 6: INFRASTRUCTURE AS CODE SECURITY
  # ═══════════════════════════════════════════════════════════════════════════

  iac-scan:
    name: Infrastructure as Code Security
    runs-on: ubuntu-latest
    needs: metadata
    if: hashFiles('**/*.tf', '**/*.yml', '**/*.yaml') != '

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: all
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true
        continue-on-error: true

      - name: TFSec Terraform Scan
        if: hashFiles('**/*.tf') != ''
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          format: sarif
          sarif_file: tfsec.sarif
        continue-on-error: true

      - name: Upload IaC Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: iac-security
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 7: LICENSE COMPLIANCE
  # ═══════════════════════════════════════════════════════════════════════════

  license-scan:
    name: License Compliance Check
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: License Finder
        run: |
          docker run --rm -v $(pwd):/scan \
            licensefinder/license_finder \
            report --format json > licenses.json || true
        continue-on-error: true

      - name: Upload License Report
        uses: actions/upload-artifact@v4
        with:
          name: license-report-${{ needs.metadata.outputs.scan_id }}
          path: licenses.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 8: SBOM GENERATION
  # ═══════════════════════════════════════════════════════════════════════════

  sbom-generation:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
        continue-on-error: true

      - name: Generate SBOM CycloneDX
        run: |
          docker run --rm -v $(pwd):/src \
            cyclonedx/cyclonedx-cli generate \
            -o /src/sbom.cdx.json /src || true
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.metadata.outputs.scan_id }}
          path: |
            sbom.spdx.json
            sbom.cdx.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 9: SUPPLY CHAIN SECURITY
  # ═══════════════════════════════════════════════════════════════════════════

  supply-chain-scan:
    name: Supply Chain Security Analysis
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Scorecard Security Analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: scorecard-results.sarif
          publish_results: true
        continue-on-error: true

      - name: Upload Scorecard Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
          category: supply-chain
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 10: MALWARE SCANNING
  # ═══════════════════════════════════════════════════════════════════════════

  malware-scan:
    name: Malware Detection
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: ClamAV Malware Scan
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam
          sudo clamscan -r --exclude-dir=".git" . > clamav-report.txt || true
          cat clamav-report.txt >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Upload Malware Report
        uses: actions/upload-artifact@v4
        with:
          name: malware-scan-report-${{ needs.metadata.outputs.scan_id }}
          path: clamav-report.txt
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 11: SECURITY REPORT & NOTIFICATIONS
  # ═══════════════════════════════════════════════════════════════════════════

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs:
      - metadata
      - secret-scan
      - dependency-scan
      - sast-scan
      - container-scan
      - iac-scan
      - license-scan
      - sbom-generation
      - supply-chain-scan
      - malware-scan
    if: always()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-reports
        continue-on-error: true

      - name: Generate Summary Report
        run: |
          echo "# Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan ID:** \`${{ needs.metadata.outputs.scan_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** ${{ needs.metadata.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST Analysis | ${{ needs.sast-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Security | ${{ needs.container-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IaC Security | ${{ needs.iac-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Compliance | ${{ needs.license-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ${{ needs.sbom-generation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supply Chain | ${{ needs.supply-chain-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Malware Scan | ${{ needs.malware-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Report generated on: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Security scan completed! Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed results.'
            })
        continue-on-error: true

      - name: Create Issue for Critical Findings
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Critical Security Issues Detected - Scan ${{ needs.metadata.outputs.scan_id }}',
              body: 'Critical security findings detected in the automated security scan.\n\nCheck the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
              labels: ['security', 'critical']
            })
        continue-on-error: true

# ═══════════════════════════════════════════════════════════════════════════
# END OF SECURITY WORKFLOW
