# ═══════════════════════════════════════════════════════════════════════════
# 🛡️ ZAYED CYBERSHIELD - COMPREHENSIVE SECURITY WORKFLOW
# ═══════════════════════════════════════════════════════════════════════════
# File: .github/workflows/security.yml
# Project: Zayed CyberShield Protection System
# Author: assar-mared (صائد الثغرات المحارب)
# Version: 2.0.0
# Date: 2026-01-05
#
# Description:
#   Professional multi-layer security scanning workflow for GitHub Actions
#   Implements defense-in-depth security testing with 15+ security tools
#
# Features:
#   ✅ SAST (Static Application Security Testing)
#   ✅ Dependency Vulnerability Scanning
#   ✅ Secret Detection
#   ✅ Container Security Scanning
#   ✅ License Compliance
#   ✅ SBOM Generation
#   ✅ Code Quality Analysis
#   ✅ Infrastructure as Code Security
#   ✅ Supply Chain Security
#   ✅ Automated Security Reporting
#
# Triggers:
#   - Push to main/develop branches
#   - Pull requests
#   - Daily scheduled scans
#   - Manual workflow dispatch
#
# الترخيص: MITمع ملحق الأجميع الحقوق محفوظة © 2026 درع زايد

الاسم : 🛡️ فحص الأمن والثغرات الأمنية

على :
  # يتم تشغيله مع كل عملية دفع إلى الفرعين الرئيسي والتطويري
  يدفع :
    الفروع :
      - رئيسي
      - يطور
      - 'حماية/**'
    تجاهل المسارات :
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

  # يتم تشغيلها على طلبات السحب التي تستهدف الفرع الرئيسي
  طلب سحب :
    الفروع :
      - رئيسي
      - يطور
    الأنواع :
      - مفتوح
      - مزامنة
      - أعيد فتحه

  فحص أمني يومي في منتصف الليل بالتوقيت العالمي المنسق
  جدول
    - cron : '0 0 * * *'

  السماح بالتشغيل اليدوي
  workflow_dispatch :
    المدخلات :
      مستوى_المسح :
        الوصف : "مستوى فحص الأمان"
        مطلوب : صحيح
        الوضع الافتراضي : 'كامل'
        النوع : اختيار
        خيارات :
          - سريع
          - معيار
          - ممتلىء
          - عنيف

الأذونات
الأذونات :
  المحتويات : اقرأ
  أحداث الأمان : كتابة
  طلبات السحب : كتابة
  المشكلات : الكتابة

متغيرات البيئة
البيئة :
  مستوى المسح : $ { { github.event.inputs.scan_level || 'standard'  } }
  إصدار بايثون : '3.11'
  NODE_VERSION : '20.x'
  GO_VERSION : '1.21'

# التزامن
التزامن :
  المجموعة : security-$ { { github.ref } }
  إلغاء قيد التنفيذ : صحيح

الوظائف :
  ═ ...
  # المهمة 1: البيانات الوصفية والإعداد
  ═ ...
  
  البيانات الوصفية :
    الاسم : 📋 بيانات تعريف فحص الأمان
    يعمل على : أحدث إصدار من أوبونتو
    outputs:
      scan_id: ${{ steps.metadata.outputs.scan_id }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    
    steps:
      - name: 🎯 Generate Scan ID
        id: metadata
        run: |
          SCAN_ID="zayed-$(date +%Y%m%d-%H%M%S)-${{ github.run_number }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "scan_id=$SCAN_ID" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "### 🛡️ Security Scan Started" >> $GITHUB_STEP_SUMMARY
          echo "**Scan ID:** \`$SCAN_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $TIMESTAMP" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: SECRET SCANNING
  # ═══════════════════════════════════════════════════════════════════════════
  
  secret-scan:
    name: 🔐 Secret Detection
    runs-on: ubuntu-latest
    needs: metadata
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better detection

      - name: 🔍 TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: 🔍 GitLeaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: 🔍 Detect-Secrets Scan
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --force-use-all-plugins \
            --exclude-files '.git/|node_modules/|\.lock$' \
            > secrets-baseline.json
          
          if [ -s secrets-baseline.json ]; then
            echo "⚠️ Potential secrets detected!" >> $GITHUB_STEP_SUMMARY
            cat secrets-baseline.json >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No secrets detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Secrets Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-report-${{ needs.metadata.outputs.scan_id }}
          path: secrets-baseline.json
          retention-days: 30
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: DEPENDENCY VULNERABILITY SCANNING
  # ═══════════════════════════════════════════════════════════════════════════
  
  dependency-scan:
    name: 📦 Dependency Security
    runs-on: ubuntu-latest
    needs: metadata
    strategy:
      matrix:
        scanner: [npm-audit, snyk, trivy, grype]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 NPM Audit
        if: matrix.scanner == 'npm-audit'
        run: |
          if [ -f "package.json" ]; then
            npm audit --json > npm-audit-report.json || true
            npm audit >> $GITHUB_STEP_SUMMARY || true
          fi

      - name: 🔍 Snyk Security Scan
        if: matrix.scanner == 'snyk'
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: 🔍 Trivy Vulnerability Scan
        if: matrix.scanner == 'trivy'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: 🔍 Grype Vulnerability Scan
        if: matrix.scanner == 'grype'
        uses: anchore/scan-action@v3
        with:
          path: "."
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          output-file: grype-results.sarif

      - name: 📤 Upload SARIF Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.scanner }}-results.sarif
          category: dependency-${{ matrix.scanner }}
        continue-on-error: true
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4: SAST (STATIC APPLICATION SECURITY TESTING)
  # ═══════════════════════════════════════════════════════════════════════════
  
  sast-scan:
    name: 🔬 SAST Analysis
    runs-on: ubuntu-latest
    needs: metadata
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript,python,cpp'
          queries: security-and-quality

      - name: 🔨 Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:multi"

      - name: 🔍 Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
          generateSarif: true

      - name: 🔍 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - name: 🔍 Bandit Python Security
        if: hashFiles('**/*.py') != ''
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . >> $GITHUB_STEP_SUMMARY || true

      - name: 🔍 ESLint Security Plugin
        if: hashFiles('**/*.js') != ''
        run: |
          npm install -g eslint eslint-plugin-security
          eslint . --ext .js --format json --output-file eslint-report.json || true
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 5: CONTAINER SECURITY
  # ═══════════════════════════════════════════════════════════════════════════
  
  container-scan:
    name: 🐳 Container Security
    runs-on: ubuntu-latest
    needs: metadata
    if: hashFiles('**/Dockerfile') != ''
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔨 Build Docker Image
        run: |
          docker build -t zayed-shield:${{ github.sha }} .

      - name: 🔍 Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'zayed-shield:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-container.sarif'
          severity: 'CRITICAL,HIGH'

      - name: 🔍 Grype Container Scan
        uses: anchore/scan-action@v3
        with:
          image: 'zayed-shield:${{ github.sha }}'
          fail-build: false
          severity-cutoff: critical

      - name: 🔍 Dockle Container Linter
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:latest \
            zayed-shield:${{ github.sha }}

      - name: 📤 Upload Container Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-container.sarif
          category: container-security
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 6: INFRASTRUCTURE AS CODE SECURITY
  # ═══════════════════════════════════════════════════════════════════════════
  
  iac-scan:
    name: ☁️ IaC Security Scan
    runs-on: ubuntu-latest
    needs: metadata
    if: hashFiles('**/*.tf', '**/*.yml', '**/*.yaml') != ''
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: all
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: 🔍 TFSec Terraform Scan
        if: hashFiles('**/*.tf') != ''
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          format: sarif
          sarif_file: tfsec.sarif

      - name: 🔍 Terrascan IaC Scan
        if: hashFiles('**/*.tf') != ''
        run: |
          docker run --rm -v $(pwd):/data \
            tenable/terrascan scan -t all -o sarif > terrascan.sarif || true

      - name: 📤 Upload IaC Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: iac-security
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 7: LICENSE COMPLIANCE
  # ═══════════════════════════════════════════════════════════════════════════
  
  license-scan:
    name: ⚖️ License Compliance
    runs-on: ubuntu-latest
    needs: metadata
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 FOSSA License Scan
        uses: fossas/fossa-action@main
        continue-on-error: true
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

      - name: 🔍 License Finder
        run: |
          docker run --rm -v $(pwd):/scan \
            licensefinder/license_finder \
            report --format json > licenses.json || true

      - name: 📤 Upload License Report
        uses: actions/upload-artifact@v4
        with:
          name: license-report-${{ needs.metadata.outputs.scan_id }}
          path: licenses.json
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 8: SBOM GENERATION
  # ═══════════════════════════════════════════════════════════════════════════
  
  sbom-generation:
    name: 📋 SBOM Generation
    runs-on: ubuntu-latest
    needs: metadata
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔨 Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: 🔨 Generate SBOM (CycloneDX)
        run: |
          docker run --rm -v $(pwd):/src \
            cyclonedx/cyclonedx-cli generate \
            -o /src/sbom.cdx.json /src

      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.metadata.outputs.scan_id }}
          path: |
            sbom.spdx.json
            sbom.cdx.json

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 9: SUPPLY CHAIN SECURITY
  # ═══════════════════════════════════════════════════════════════════════════
  
  supply-chain-scan:
    name: 🔗 Supply Chain Security
    runs-on: ubuntu-latest
    needs: metadata
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Scorecard Analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: scorecard-results.sarif
          publish_results: true

      - name: 📤 Upload Scorecard Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
          category: supply-chain
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 10: MALWARE SCANNING
  # ═══════════════════════════════════════════════════════════════════════════
  
  malware-scan:
    name: 🦠 Malware Detection
    runs-on: ubuntu-latest
    needs: metadata
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 ClamAV Scan
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam
          sudo clamscan -r --exclude-dir=".git" . > clamav-report.txt || true
          cat clamav-report.txt >> $GITHUB_STEP_SUMMARY

      - name: 🔍 YARA Rules Scan
        run: |
          sudo apt-get install -y yara
          # Add custom YARA rules here
          find . -type f -name "*.exe" -o -name "*.dll" | \
            xargs yara -r /path/to/rules . > yara-report.txt || true
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 11: REPORTING & NOTIFICATIONS
  # ═══════════════════════════════════════════════════════════════════════════
  
  security-report:
    name: 📊 Security Report
    runs-on: ubuntu-latest
    needs: 
      - metadata
      - secret-scan
      - dependency-scan
      - sast-scan
      - container-scan
      - iac-scan
      - license-scan
      - sbom-generation
      - supply-chain-scan
      - malware-scan
    if: always()
    
    steps:
      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-reports

      - name: 📊 Generate Summary Report
        run: |
          echo "# 🛡️ Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan ID:** \`${{ needs.metadata.outputs.scan_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** ${{ needs.metadata.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST Analysis | ${{ needs.sast-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Security | ${{ needs.container-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IaC Security | ${{ needs.iac-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Compliance | ${{ needs.license-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ${{ needs.sbom-generation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supply Chain | ${{ needs.supply-chain-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Malware Scan | ${{ needs.malware-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "🎖️ **Zayed CyberShield** | صائد الثغرات المحارب" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🛡️ **Security scan completed!** Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })

      - name: 📧 Send Notification (Critical Findings)
        if: failure()
        run: |
          echo "🚨 CRITICAL SECURITY FINDINGS DETECTED!" >> $GITHUB_STEP_SUMMARY
          echo "Immediate action required!" >> $GITHUB_STEP_SUMMARY
          # Add email/Slack notification here

# ═══════════════════════════════════════════════════════════════════════════
# END OF SECURITY WORKFLOW
# ═══════════════════════════════════════════════════════════════════════════
