# =============================================================================
# ZAYED SHIELD — ULTIMATE CI/CD SECURITY PIPELINE
# File        : .github/workflows/ultimate-pipeline.yml
# Author      : nike4565 (formerly asrar-mared)
# Contact     : nike49424@gmail.com
# Version     : 1.1.1 — Silent Sentinel
# Description : Enterprise-grade security scanning, validation, SLSA3
#               compliance, automated advisory remediation, and deployment
#               pipeline for the Zayed Shield remediation engine.
# Dedication  : United Arab Emirates
#               In tribute to Sheikh Zayed bin Sultan Al Nahyan
# =============================================================================

name: "Zayed Shield — Ultimate Security Pipeline"

on:
  push:
    branches: [ main, master, develop ]
    tags:     [ "v*.*.*" ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Automated scan every 6 hours — Silent Sentinel mode
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - scan-only
          - fix-only
          - report-only

# ─── GLOBAL PERMISSIONS ───────────────────────────────────────────────────────
permissions:
  contents:      write
  security-events: write
  pull-requests: write
  issues:        write
  id-token:      write   # SLSA3 provenance
  packages:      write
  actions:       read

# ─── CONCURRENCY ──────────────────────────────────────────────────────────────
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

# ─── GLOBAL ENV ───────────────────────────────────────────────────────────────
env:
  AUTHOR:         "nike4565"
  PROJECT:        "Zayed-Shield"
  VERSION:        "1.1.1"
  GPG_KEY_ID:     "8429D4C1ECAC3080BCB84AA0982159B70BA77EFD"
  ADVISORY_REPO:  "github/advisory-database"
  NODE_VERSION:   "24"
  PYTHON_VERSION: "3.12"

# =============================================================================
# JOBS
# =============================================================================

jobs:

# ─── JOB 1: SECRET SCANNING ───────────────────────────────────────────────────
  secret-scan:
    name: "Secret Scanning — Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Upload Gitleaks SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks
        continue-on-error: true

# ─── JOB 2: SHELLCHECK STATIC ANALYSIS ───────────────────────────────────────
  shellcheck:
    name: "Static Analysis — ShellCheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all Bash scripts
        run: |
          echo "── ShellCheck Analysis ──────────────────────────────────"
          find . -name "*.sh" -not -path "./.git/*" | while read -r script; do
            echo "Scanning: ${script}"
            shellcheck --severity=warning --format=gcc "${script}"
          done
          echo "ShellCheck: All scripts passed."

      - name: ShellCheck SARIF output
        run: |
          find . -name "*.sh" -not -path "./.git/*" \
            -exec shellcheck --format=json {} \; \
            > shellcheck-results.json 2>/dev/null || true

      - name: Upload ShellCheck results
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-results
          path: shellcheck-results.json
          retention-days: 30

# ─── JOB 3: TRIVY SECURITY SCAN ──────────────────────────────────────────────
  trivy-scan:
    name: "Vulnerability Scan — Trivy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:    "fs"
          scan-ref:     "."
          format:       "sarif"
          output:       "trivy-fs.sarif"
          severity:     "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category:   trivy-filesystem

      - name: Run Trivy config scan (IaC / misconfigurations)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref:  "."
          format:    "table"
          severity:  "CRITICAL,HIGH"
        continue-on-error: true

# ─── JOB 4: DEPENDENCY AUDIT ──────────────────────────────────────────────────
  dependency-audit:
    name: "Dependency Audit — npm + OWASP"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
        continue-on-error: true

      - name: Bootstrap package and lock file
        run: |
          if [[ ! -f package.json ]]; then
            echo "No package.json — bootstrapping"
            npm init -y
          fi
          if [[ ! -f package-lock.json ]] && [[ ! -f yarn.lock ]] && [[ ! -f npm-shrinkwrap.json ]]; then
            echo "No lock file — generating package-lock.json"
            npm install --package-lock-only --ignore-scripts 2>/dev/null ||             npm install --ignore-scripts 2>/dev/null || true
          fi

      - name: Install dependencies
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci --prefer-offline 2>/dev/null || npm install --ignore-scripts
          else
            npm install --ignore-scripts || true
          fi

      - name: Run npm audit
        run: |
          npm audit --json > npm-audit-report.json 2>/dev/null || true
          npm audit --audit-level=moderate 2>/dev/null || true

      - name: TruffleHog secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path:  "./"
          base:  "${{ github.event.repository.default_branch }}"
          extra_args: "--only-verified"
        continue-on-error: true

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project:   "${{ env.PROJECT }}"
          path:      "."
          format:    "HTML"
          out:       "owasp-report"
          args:      "--enableExperimental --failOnCVSS 7"
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: owasp-report/
          retention-days: 30

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

# ─── JOB 5: SNYK SECURITY SCAN ───────────────────────────────────────────────
  snyk-scan:
    name: "Vulnerability Scan — Snyk"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif
        continue-on-error: true

      - name: Upload Snyk SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
          category:   snyk
        continue-on-error: true

# ─── JOB 6: CODEQL ANALYSIS ──────────────────────────────────────────────────
  codeql:
    name: "Code Analysis — CodeQL"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ javascript, python ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries:   security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

# ─── JOB 7: SBOM GENERATION ──────────────────────────────────────────────────
  sbom:
    name: "SBOM Generation — Syft"
    runs-on: ubuntu-latest
    needs: [ dependency-audit ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path:           "."
          format:         "spdx-json"
          output-file:    "zayed-shield-sbom.spdx.json"
          artifact-name:  "sbom-spdx"

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path:           "."
          format:         "cyclonedx-json"
          output-file:    "zayed-shield-sbom.cdx.json"
          artifact-name:  "sbom-cyclonedx"

      - name: Scan SBOM for vulnerabilities with Grype
        uses: anchore/scan-action@v3
        with:
          sbom:        "zayed-shield-sbom.spdx.json"
          fail-build:  false
          severity-cutoff: high

# ─── JOB 8: ZAYED SHIELD CORE VALIDATION ─────────────────────────────────────
  core-validation:
    name: "Core Validation — Zayed Shield Engine"
    runs-on: ubuntu-latest
    needs: [ shellcheck, secret-scan ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate main automation script syntax
        run: |
          echo "── Bash Syntax Validation ───────────────────────────────"
          find . -name "*.sh" -not -path "./.git/*" | while read -r script; do
            bash -n "${script}" && echo "PASS: ${script}" || echo "FAIL: ${script}"
          done

      - name: Validate YAML workflow files
        run: |
          pip install yamllint --quiet
          find .github/workflows -name "*.yml" -o -name "*.yaml" 2>/dev/null | \
            xargs yamllint -d relaxed || true

      - name: Validate JSON advisory files
        run: |
          find . -name "*.json" -not -path "./.git/*" \
                               -not -path "./node_modules/*" | \
          while read -r jfile; do
            python3 -c "import json,sys; json.load(open('${jfile}'))" \
              && echo "PASS: ${jfile}" \
              || echo "FAIL: ${jfile}"
          done

      - name: Run dry-run engine execution
        run: |
          if [[ -f zayed-shield-automation.sh ]]; then
            bash -n zayed-shield-automation.sh
            echo "Engine dry-run: PASSED"
          fi

# ─── JOB 9: ADVISORY REMEDIATION ─────────────────────────────────────────────
  advisory-remediation:
    name: "Advisory Remediation — Automated CVE Fix"
    runs-on: ubuntu-latest
    needs: [ core-validation ]
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.mode == 'full' ||
      github.event.inputs.mode == 'fix-only'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure Git identity
        run: |
          git config --global user.name  "${{ env.AUTHOR }}"
          git config --global user.email "nike49424@gmail.com"

      - name: Execute Zayed Shield remediation engine
        run: |
          if [[ -f zayed-shield-automation.sh ]]; then
            chmod +x zayed-shield-automation.sh
            ./zayed-shield-automation.sh --auto || true
          else
            echo "Engine script not found — scanning NPM advisories directly"
            npm audit --json > audit-output.json 2>/dev/null || true
          fi

      - name: Upload remediation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remediation-results
          path: |
            zayed-shield-workspace/reports/
            zayed-shield-workspace/logs/
            zayed-shield-workspace/patches/
          retention-days: 90
        continue-on-error: true

# ─── JOB 10: SLSA3 PROVENANCE ────────────────────────────────────────────────
  slsa-provenance:
    name: "SLSA3 Provenance Generation"
    runs-on: ubuntu-latest
    needs:
      - shellcheck
      - trivy-scan
      - dependency-audit
      - core-validation
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents:  write
      id-token:  write
      actions:   read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          tar -czf zayed-shield-${{ github.ref_name }}.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='zayed-shield-workspace' \
            .
          sha256sum zayed-shield-${{ github.ref_name }}.tar.gz > \
            zayed-shield-${{ github.ref_name }}.tar.gz.sha256

      - name: Generate SLSA3 provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
        with:
          base64-subjects: |
            ${{ hashFiles('zayed-shield-*.tar.gz') }}
        continue-on-error: true

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            zayed-shield-*.tar.gz
            zayed-shield-*.sha256
          retention-days: 90

# ─── JOB 11: SECURITY REPORT ─────────────────────────────────────────────────
  security-report:
    name: "Security Report — Consolidated Audit"
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - shellcheck
      - trivy-scan
      - dependency-audit
      - codeql
      - sbom
      - core-validation
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports/
        continue-on-error: true

      - name: Generate consolidated security report
        run: |
          REPORT_FILE="SECURITY-REPORT-$(date +%Y%m%d).md"
          cat > "${REPORT_FILE}" << REPORT
          # Zayed Shield — Consolidated Security Report
          **Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          **Version**: ${{ env.VERSION }}
          **Author**: ${{ env.AUTHOR }}
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}
          **Triggered by**: ${{ github.event_name }}

          ---

          ## Pipeline Status

          | Stage | Tool | Status |
          |-------|------|--------|
          | Secret Scanning | Gitleaks + TruffleHog | ${{ needs.secret-scan.result }} |
          | Static Analysis | ShellCheck | ${{ needs.shellcheck.result }} |
          | Vulnerability Scan | Trivy | ${{ needs.trivy-scan.result }} |
          | Dependency Audit | npm + OWASP | ${{ needs.dependency-audit.result }} |
          | Code Analysis | CodeQL | ${{ needs.codeql.result }} |
          | SBOM | Syft + Grype | ${{ needs.sbom.result }} |
          | Core Validation | Bash + YAML + JSON | ${{ needs.core-validation.result }} |

          ---

          ## Author

          | Field | Value |
          |-------|-------|
          | Username | ${{ env.AUTHOR }} (formerly asrar-mared) |
          | Email | nike49424@gmail.com |
          | GPG Key | ${{ env.GPG_KEY_ID }} |
          | Project | ${{ env.PROJECT }} v${{ env.VERSION }} |

          ---
          *Zayed Shield — Dedicated to the United Arab Emirates.*
          REPORT
          echo "Report generated: ${REPORT_FILE}"

      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-security-report
          path: "SECURITY-REPORT-*.md"
          retention-days: 90

      - name: Post pipeline summary
        run: |
          echo "## Zayed Shield Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ShellCheck | ${{ needs.shellcheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM | ${{ needs.sbom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Core Validation | ${{ needs.core-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Zayed Shield v${{ env.VERSION }} — nike4565_" >> $GITHUB_STEP_SUMMARY

# ─── JOB 12: RELEASE PUBLISHER ───────────────────────────────────────────────
  release:
    name: "Release — Publish to GitHub"
    runs-on: ubuntu-latest
    needs:
      - slsa-provenance
      - security-report
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets/
        continue-on-error: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Zayed Shield ${{ github.ref_name }} — Silent Sentinel"
          body: |
            ## Zayed Shield ${{ github.ref_name }} — Silent Sentinel

            > *"The most dangerous security tool is the one that works while you sleep."*

            Automated vulnerability remediation engine for the GitHub Advisory Database ecosystem.

            ### Pipeline Results
            - Secret Scanning: Gitleaks + TruffleHog
            - Static Analysis: ShellCheck (zero warnings)
            - Vulnerability Scanning: Trivy + Snyk + OWASP
            - Code Analysis: CodeQL (JavaScript + Python)
            - SBOM: SPDX + CycloneDX formats
            - Provenance: SLSA3 compliant

            ### Author
            **nike4565** (formerly asrar-mared)
            `nike49424@gmail.com`
            GPG: `8429D4C1ECAC3080BCB84AA0982159B70BA77EFD`

            *Dedicated to the United Arab Emirates.*
          draft:      false
          prerelease: false
          files:   release-assets/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
